# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    groups:
      fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic*"
          - "python-multipart"
          - "python-dotenv"
      database:
        patterns:
          - "sqlalchemy*"
          - "aiosqlite"
          - "asyncpg"
          - "alembic"
      ai-sdks:
        patterns:
          - "claude-agent-sdk"
          - "google-genai"
          - "openai"
          - "volcengine-python-sdk*"
          - "xai-sdk"
          - "instructor"
      auth:
        patterns:
          - "pyjwt"
          - "pwdlib*"
      media:
        patterns:
          - "Pillow"
          - "ffmpeg-python"
          - "pyjianyingdraft"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
        update-types:
          - "minor"
          - "patch"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Frontend npm dependencies (pnpm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite-tailwind:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "autoprefixer"
          - "postcss"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      i18n-packages:
        patterns:
          - "i18next*"
          - "react-i18next"
      types:
        patterns:
          - "@types/*"
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
